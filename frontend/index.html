<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Speedtest Tray</title>
    </head>
    <body>
        <div id="app" class="container">
            <header>
                <img
                    src="banner.png"
                    alt="Speedtest Tray"
                    class="header-logo"
                />
                <button
                    id="close-btn"
                    class="icon-btn"
                    onclick="window.go.gui_wails.App.HideWindow()"
                >
                    ✕
                </button>
            </header>

            <main class="metrics-grid">
                <div class="metric-row">
                    <span class="label">Server Location:</span>
                    <span id="server" class="value">--</span>
                </div>
                <div class="metric-row">
                    <span class="label">Ping:</span>
                    <span id="ping" class="value">--</span>
                </div>

                <div class="metric-group">
                    <div class="metric-row">
                        <span class="label">Download:</span>
                        <span id="download" class="value">--</span>
                    </div>
                    <div class="progress-bg">
                        <div id="dl-progress" class="progress-bar"></div>
                    </div>
                </div>

                <div class="metric-group">
                    <div class="metric-row">
                        <span class="label">Upload:</span>
                        <span id="upload" class="value">--</span>
                    </div>
                    <div class="progress-bg">
                        <div id="ul-progress" class="progress-bar"></div>
                    </div>
                </div>
            </main>

            <footer>
                <div id="status" class="status">Ready</div>
                <button id="run-btn" class="main-btn" onclick="startTest()">
                    Start
                </button>
            </footer>
        </div>

        <script src="main.js"></script>
    </body>
</html>
