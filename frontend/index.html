<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="speedometer.css" />
        <title>Speedtest Tray</title>
    </head>
    <body>
        <div id="app" class="container">
            <header>
                <img
                    src="banner.png"
                    alt="Speedtest Tray"
                    class="header-logo"
                />
                <button
                    id="close-btn"
                    class="icon-btn"
                    onclick="window.go.gui_wails.App.HideWindow()"
                >
                    ✕
                </button>
            </header>

            <main class="main-content">
                <div class="metrics-container">
                    <div class="metric-row">
                        <span class="label">Server:</span>
                        <span id="server" class="value">--</span>
                    </div>
                    <div class="metric-row">
                        <span class="label">Ping:</span>
                        <span id="ping" class="value">--</span>
                    </div>
                    <div class="metric-row">
                        <span class="label">Download:</span>
                        <span id="download" class="value">--</span>
                    </div>
                    <div class="metric-row">
                        <span class="label">Upload:</span>
                        <span id="upload" class="value">--</span>
                    </div>
                </div>

                <div class="spacer"></div>

                <!-- Custom Speedometer Component -->
                <speedometer-gauge id="speedometer"></speedometer-gauge>
            </main>

            <footer>
                <div id="status" class="status">Ready</div>
                <button
                    id="run-btn"
                    class="main-btn"
                >
                    Start
                </button>
            </footer>
        </div>

        <script src="speedometer.js"></script>
        <script type="module" src="main.js"></script>
    </body>
</html>
