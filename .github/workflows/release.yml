    steps:
      - uses: actions/checkout@v4
      # TODO: full build steps added by feature/installer/tests

  build-macos-intel:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: full build steps added by feature/installer/tests

  build-macos-arm:
