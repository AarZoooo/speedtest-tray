name: Build SpeedTest Tray

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: contains(github.event.head_commit.message, '[ci]') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails App
        run: |
          go generate ./...
          wails build -platform windows/amd64 -o speedtest-tray-portable.exe -clean

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTest-Tray-Windows
          path: build/bin/speedtest-tray-portable.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, '[ci]') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails App (Universal macOS)
        run: |
          go generate ./...
          wails build -platform darwin/universal -clean

      - name: Install Packaging Tools
        run: brew install create-dmg fileicon

      - name: Package macOS DMG
        run: |
          ICON_PATH=$(find "build/bin/SpeedTest Tray.app/Contents/Resources" -name "*.icns" | head -n 1)
          echo "Found volume icon at: $ICON_PATH"
          create-dmg \
            --volname "SpeedTest Tray" \
            --volicon "$ICON_PATH" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SpeedTest Tray.app" 175 190 \
            --app-drop-link 425 190 \
            --hide-extension "SpeedTest Tray.app" \
            "SpeedTest-Tray-macOS-Universal.dmg" \
            "build/bin/"
          
          # Set the DMG file icon itself
          fileicon set SpeedTest-Tray-macOS-Universal.dmg "$ICON_PATH"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTest-Tray-macOS-Universal-DMG
          path: SpeedTest-Tray-macOS-Universal.dmg
