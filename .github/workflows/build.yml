name: SpeedTest Tray CI

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Backend + Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Frontend Config
        run: go generate ./...

      - name: Run Backend Tests
        run: go test -v ./...

      - name: Run Backend Race Tests
        run: go test -race ./internal/speedtest_util ./internal/gui_wails

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    needs: test
    if: contains(github.event.head_commit.message, '[ci]') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails App
        run: |
          go generate ./...
          wails build -platform windows/${{ matrix.arch }} -o speedtest-tray-windows-${{ matrix.arch }}.exe -clean

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTest-Tray-Windows-${{ matrix.arch }}
          path: build/bin/speedtest-tray-windows-${{ matrix.arch }}.exe

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    needs: test
    if: contains(github.event.head_commit.message, '[ci]') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - arch: amd64
            dmg_label: Intel
          - arch: arm64
            dmg_label: ARM
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails App
        run: |
          go generate ./...
          wails build -platform darwin/${{ matrix.arch }} -clean

      - name: Install Packaging Tools
        run: brew install create-dmg fileicon

      - name: Package macOS DMG
        run: |
          ICON_PATH=$(find "build/bin/SpeedTest Tray.app/Contents/Resources" -name "*.icns" | head -n 1)
          echo "Found volume icon at: $ICON_PATH"
          DMG_NAME="SpeedTest-Tray-macOS-${{ matrix.dmg_label }}.dmg"
          create-dmg \
            --volname "SpeedTest Tray" \
            --volicon "$ICON_PATH" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SpeedTest Tray.app" 175 190 \
            --app-drop-link 425 190 \
            --hide-extension "SpeedTest Tray.app" \
            "$DMG_NAME" \
            "build/bin/"

          # Set the DMG file icon itself
          fileicon set "$DMG_NAME" "$ICON_PATH"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTest-Tray-macOS-${{ matrix.dmg_label }}-DMG
          path: SpeedTest-Tray-macOS-${{ matrix.dmg_label }}.dmg
