name: Build SpeedTest Tray

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails App
        run: |
          go generate ./...
          wails build -platform windows/amd64 -clean

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTest-Tray-Windows
          path: build/bin/speedtest-tray-portable.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails App (Universal macOS)
        run: |
          go generate ./...
          wails build -platform darwin/universal -clean

      - name: Package macOS App Bundle
        run: |
          cd build/bin
          zip -r ../../SpeedTest-Tray-macOS-Universal.zip "SpeedTest Tray.app"

      - name: Upload macOS Zip
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTest-Tray-macOS-Universal
          path: SpeedTest-Tray-macOS-Universal.zip
